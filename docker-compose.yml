services:
  gtnh:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MC_IMAGE_TAG: ${MC_IMAGE_TAG:-2026.5.3-java25}
        MC_BACKUP_IMAGE_TAG: ${MC_BACKUP_IMAGE_TAG:-2026.7.1}
    image: ${GTNH_IMAGE_NAME:-gtnh-minecraft-server}:${MC_IMAGE_TAG:-2026.5.3-java25}
    container_name: ${CONTAINER_NAME:-gtnh}
    restart: on-failure:3
    stop_grace_period: ${STOP_GRACE_PERIOD:-10m}
    stdin_open: true
    tty: true
    environment:
      EULA: "TRUE"
      TYPE: GTNH
      TZ: ${TZ:-America/Santo_Domingo}
      UID: ${MC_UID:-1000}
      GID: ${MC_GID:-1000}
      MEMORY: ${MEMORY:-12G}
      STOP_DURATION: ${STOP_DURATION:-540}
      STOP_SERVER_ANNOUNCE_DELAY: ${STOP_SERVER_ANNOUNCE_DELAY:-0}
      JVM_OPTS: ${JVM_OPTS:-}
      JVM_DD_OPTS: ${JVM_DD_OPTS:-}
      AUTO_CONFIRM_FORGE_QUERIES: ${AUTO_CONFIRM_FORGE_QUERIES:-false}
      GTNH_INTERNAL_BACKUP_TIMER: ${GTNH_INTERNAL_BACKUP_TIMER:-0.5}
      GTNH_INTERNAL_BACKUPS_TO_KEEP: ${GTNH_INTERNAL_BACKUPS_TO_KEEP:-24}
      GTNH_INTERNAL_BACKUP_MAX_GB: ${GTNH_INTERNAL_BACKUP_MAX_GB:-20}
      GTNH_INTERNAL_BACKUP_COMPRESSION: ${GTNH_INTERNAL_BACKUP_COMPRESSION:-4}
      GTNH_INTERNAL_BACKUP_CLAIMED_ONLY: ${GTNH_INTERNAL_BACKUP_CLAIMED_ONLY:-true}
      GTNH_INTERNAL_BACKUP_WHOLE_REGIONS: ${GTNH_INTERNAL_BACKUP_WHOLE_REGIONS:-true}
      GTNH_HODGEPODGE_POOL_ZLIB_INSTANCES: ${GTNH_HODGEPODGE_POOL_ZLIB_INSTANCES:-false}
      GTNH_HODGEPODGE_SPEEDUP_CHUNK_COMPRESSION: ${GTNH_HODGEPODGE_SPEEDUP_CHUNK_COMPRESSION:-false}
      GTNH_PACK_VERSION: ${GTNH_PACK_VERSION:-2.9.0-beta-2}
      GTNH_PACK_URL: ${GTNH_PACK_URL:-}
      GTNH_PACK_SHA256: ${GTNH_PACK_SHA256:-}
      GTNH_GITHUB_TOKEN: ${GTNH_GITHUB_TOKEN:-}
      GTNH_PRE_UPDATE_BACKUP: ${GTNH_PRE_UPDATE_BACKUP:-true}
      GTNH_RESTIC_REPOSITORY: /backups/restic
      GTNH_RESTIC_PASSWORD: ${GTNH_RESTIC_PASSWORD:-}
      GTNH_RESTIC_PASSWORD_FILE: /backups/.gtnh-restic-password
      GTNH_RESTIC_HOSTNAME: ${GTNH_RESTIC_HOSTNAME:-gtnh}
      GTNH_RESTIC_RETRY_LOCK: ${GTNH_RESTIC_RETRY_LOCK:-5m}
      GTNH_RESTIC_READ_CONCURRENCY: ${GTNH_RESTIC_READ_CONCURRENCY:-4}
      GTNH_RESTIC_PROGRESS_SECONDS: ${GTNH_RESTIC_PROGRESS_SECONDS:-10}
      GTNH_RESTIC_COMPRESSION: ${GTNH_RESTIC_COMPRESSION:-auto}
      GTNH_PRE_UPDATE_SNAPSHOTS_KEEP: ${GTNH_PRE_UPDATE_SNAPSHOTS_KEEP:-2}
      GTNH_ARTIFACT_CACHE_KEEP: ${GTNH_ARTIFACT_CACHE_KEEP:-2}
      GTNH_TRANSACTION_BACKUPS_KEEP: ${GTNH_TRANSACTION_BACKUPS_KEEP:-2}
      GTNH_BACKUP_MIN_FREE_GB: ${GTNH_BACKUP_MIN_FREE_GB:-20}
      SKIP_GTNH_UPDATE_CHECK: ${SKIP_GTNH_UPDATE_CHECK:-false}
      SERVER_PORT: ${SERVER_PORT:-25565}
      MAX_PLAYERS: ${MAX_PLAYERS:-10}
      MOTD: ${MOTD:-GregTech New Horizons}
      VIEW_DISTANCE: ${VIEW_DISTANCE:-10}
      SIMULATION_DISTANCE: ${SIMULATION_DISTANCE:-10}
      ONLINE_MODE: ${ONLINE_MODE:-true}
      PVP: ${PVP:-true}
      SPAWN_PROTECTION: ${SPAWN_PROTECTION:-0}
      DIFFICULTY: ${DIFFICULTY:-hard}
      ALLOW_FLIGHT: ${ALLOW_FLIGHT:-true}
      ENABLE_COMMAND_BLOCK: ${ENABLE_COMMAND_BLOCK:-true}
      ENABLE_QUERY: ${ENABLE_QUERY:-false}
      QUERY_PORT: ${QUERY_PORT:-25565}
      ENABLE_RCON: "true"
      RCON_PORT: ${RCON_PORT:-25575}
      ENABLE_WHITELIST: ${ENABLE_WHITELIST:-true}
      ENFORCE_WHITELIST: ${ENFORCE_WHITELIST:-true}
      LEVEL_TYPE: ${LEVEL_TYPE:-rwg}
    ports:
      - "${MC_PORT:-25565}:${SERVER_PORT:-25565}/tcp"
      - "${QUERY_PORT:-25565}:${QUERY_PORT:-25565}/udp"
    volumes:
      - gtnh-data:/data
      - gtnh-backups:/backups
    labels:
      me.isalab.gtnh.role: server
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 20m

  gtnh-backups:
    image: itzg/mc-backup:${MC_BACKUP_IMAGE_TAG:-2026.7.1}
    container_name: ${BACKUP_CONTAINER_NAME:-gtnh-backups}
    user: "${MC_UID:-1000}:${MC_GID:-1000}"
    restart: on-failure:5
    depends_on:
      gtnh:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      BACKUP_NAME: ${BACKUP_NAME:-gtnh}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-12h}
      INITIAL_DELAY: ${BACKUP_INITIAL_DELAY:-0}
      BACKUP_ON_STARTUP: "true"
      BACKUP_METHOD: restic
      ENABLE_SYNC: "false"
      RESTIC_REPOSITORY: /backups/restic
      RESTIC_PASSWORD_FILE: /backups/.gtnh-restic-password
      RESTIC_CACHE_DIR: /tmp/restic-cache
      RESTIC_HOSTNAME: ${GTNH_RESTIC_HOSTNAME:-gtnh}
      RESTIC_ADDITIONAL_TAGS: scheduled
      RESTIC_RETRY_LOCK: ${GTNH_RESTIC_RETRY_LOCK:-5m}
      GTNH_BACKUP_MIN_FREE_GB: ${GTNH_BACKUP_MIN_FREE_GB:-20}
      EXCLUDES_FILE: /backups/.gtnh-restic-source-excludes
      PRUNE_RESTIC_RETENTION: ${PRUNE_RESTIC_RETENTION:---keep-within 24h --keep-daily 7 --keep-weekly 4 --keep-monthly 3}
      EXCLUDES: ${BACKUP_EXCLUDES:-*.jar,cache,logs,*.tmp,backups,.gtnh-manager,.gtnh-recovery,gtnh-upgrade-*,World-*.zip,packs}
      RCON_RETRIES: "30"
      RCON_RETRY_INTERVAL: 10s
      RCON_HOST: gtnh
      RCON_PORT: ${RCON_PORT:-25575}
      PRE_BACKUP_SCRIPT: |
        min_gb="$${GTNH_BACKUP_MIN_FREE_GB:-20}"
        available_kb="$$(df -Pk /backups | awk 'NR == 2 {print $$4}')"
        required_kb="$$(( min_gb * 1024 * 1024 ))"
        if [ "$$available_kb" -lt "$$required_kb" ]; then
          echo "Refusing backup: less than $${min_gb} GiB remains free on /backups." >&2
          exit 1
        fi
      POST_BACKUP_SCRIPT: |
        if [ "$$1" -ne 0 ]; then
          echo "Backup failed with status $$1; keeping the previous verification marker and waiting for the next interval." >&2
          exit 0
        fi
        latest="$$(restic snapshots --host "$${RESTIC_HOSTNAME}" --tag "$${BACKUP_NAME},scheduled" --latest 1 --json | jq -r '.[0].id // empty')"
        test -n "$$latest"
        printf '%s\n' "$$latest" > /backups/.last-restic-snapshot
        date -u +%s > /backups/.last-verified
    volumes:
      - gtnh-data:/data:ro
      - gtnh-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "test -s /backups/.last-verified && test \"$$(( $$(date +%s) - $$(cat /backups/.last-verified) ))\" -lt 46800"]
      interval: 30m
      timeout: 30s
      retries: 2
      start_period: 45m

volumes:
  gtnh-data:
  gtnh-backups:
