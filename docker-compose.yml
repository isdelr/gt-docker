services:
  gtnh:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MC_IMAGE_TAG: ${MC_IMAGE_TAG:-2026.5.3-java25}
    image: ${GTNH_IMAGE_NAME:-gtnh-minecraft-server}:${MC_IMAGE_TAG:-2026.5.3-java25}
    container_name: ${CONTAINER_NAME:-gtnh}
    restart: on-failure:3
    stop_grace_period: ${STOP_GRACE_PERIOD:-10m}
    stdin_open: true
    tty: true
    environment:
      EULA: "TRUE"
      TYPE: GTNH
      TZ: ${TZ:-America/Santo_Domingo}
      UID: ${MC_UID:-1000}
      GID: ${MC_GID:-1000}
      MEMORY: ${MEMORY:-12G}
      STOP_DURATION: ${STOP_DURATION:-540}
      STOP_SERVER_ANNOUNCE_DELAY: ${STOP_SERVER_ANNOUNCE_DELAY:-0}
      JVM_OPTS: ${JVM_OPTS:-}
      JVM_DD_OPTS: ${JVM_DD_OPTS:-}
      AUTO_CONFIRM_FORGE_QUERIES: ${AUTO_CONFIRM_FORGE_QUERIES:-false}
      AUTO_RESTORE_ON_CORRUPT_LEVELDAT: ${AUTO_RESTORE_ON_CORRUPT_LEVELDAT:-false}
      AUTO_RESTORE_ON_FML_LEVELDAT_WARNING: ${AUTO_RESTORE_ON_FML_LEVELDAT_WARNING:-false}
      AUTO_RESTORE_BACKUP_DIRS: ${AUTO_RESTORE_BACKUP_DIRS:-/backups /data/backups}
      AUTO_RESTORE_BACKUP_MAX_DEPTH: ${AUTO_RESTORE_BACKUP_MAX_DEPTH:-4}
      CORRUPTION_GUARD_ENABLED: ${CORRUPTION_GUARD_ENABLED:-true}
      CORRUPTION_GUARD_CLEAR: ${CORRUPTION_GUARD_CLEAR:-false}
      GTNH_DISABLE_OPTIMIZED_CHUNK_COMPRESSION: ${GTNH_DISABLE_OPTIMIZED_CHUNK_COMPRESSION:-true}
      GTNH_CHUNK_SAVE_DEBUG: ${GTNH_CHUNK_SAVE_DEBUG:-true}
      GTNH_INTERNAL_BACKUP_TIMER: ${GTNH_INTERNAL_BACKUP_TIMER:-0.5}
      GTNH_INTERNAL_BACKUPS_TO_KEEP: ${GTNH_INTERNAL_BACKUPS_TO_KEEP:-48}
      GTNH_INTERNAL_BACKUP_MAX_GB: ${GTNH_INTERNAL_BACKUP_MAX_GB:-35}
      GTNH_INTERNAL_BACKUP_COMPRESSION: ${GTNH_INTERNAL_BACKUP_COMPRESSION:-4}
      GTNH_INTERNAL_BACKUP_CLAIMED_ONLY: ${GTNH_INTERNAL_BACKUP_CLAIMED_ONLY:-true}
      GTNH_INTERNAL_BACKUP_WHOLE_REGIONS: ${GTNH_INTERNAL_BACKUP_WHOLE_REGIONS:-true}
      GTNH_PACK_VERSION: ${GTNH_PACK_VERSION:-2.9.0-beta-2}
      GTNH_PACK_URL: ${GTNH_PACK_URL:-}
      GTNH_PACK_SHA256: ${GTNH_PACK_SHA256:-}
      GTNH_GITHUB_TOKEN: ${GTNH_GITHUB_TOKEN:-}
      GTNH_PRE_UPDATE_BACKUP: ${GTNH_PRE_UPDATE_BACKUP:-true}
      GTNH_PRE_UPDATE_BACKUP_THREADS: ${GTNH_PRE_UPDATE_BACKUP_THREADS:-0}
      GTNH_PRE_UPDATE_BACKUP_PROGRESS_SECONDS: ${GTNH_PRE_UPDATE_BACKUP_PROGRESS_SECONDS:-30}
      SKIP_GTNH_UPDATE_CHECK: ${SKIP_GTNH_UPDATE_CHECK:-false}
      GTNH_DELETE_BACKUPS: ${GTNH_DELETE_BACKUPS:-false}
      SERVER_PORT: ${SERVER_PORT:-25565}
      MAX_PLAYERS: ${MAX_PLAYERS:-10}
      MOTD: ${MOTD:-GregTech New Horizons}
      VIEW_DISTANCE: ${VIEW_DISTANCE:-10}
      SIMULATION_DISTANCE: ${SIMULATION_DISTANCE:-10}
      ONLINE_MODE: ${ONLINE_MODE:-true}
      PVP: ${PVP:-true}
      SPAWN_PROTECTION: ${SPAWN_PROTECTION:-0}
      DIFFICULTY: ${DIFFICULTY:-hard}
      ALLOW_FLIGHT: ${ALLOW_FLIGHT:-true}
      ENABLE_COMMAND_BLOCK: ${ENABLE_COMMAND_BLOCK:-true}
      ENABLE_QUERY: ${ENABLE_QUERY:-false}
      QUERY_PORT: ${QUERY_PORT:-25565}
      ENABLE_RCON: "true"
      RCON_PORT: ${RCON_PORT:-25575}
      ENABLE_WHITELIST: ${ENABLE_WHITELIST:-true}
      ENFORCE_WHITELIST: ${ENFORCE_WHITELIST:-true}
      LEVEL_TYPE: ${LEVEL_TYPE:-rwg}
    ports:
      - "${MC_PORT:-25565}:${SERVER_PORT:-25565}/tcp"
      - "${QUERY_PORT:-25565}:${QUERY_PORT:-25565}/udp"
    volumes:
      - gtnh-data:/data
      - gtnh-backups:/backups
    labels:
      me.isalab.gtnh.role: server
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 20m

  gtnh-backups:
    image: itzg/mc-backup:${MC_BACKUP_IMAGE_TAG:-2026.7.1}
    container_name: ${BACKUP_CONTAINER_NAME:-gtnh-backups}
    restart: on-failure:5
    depends_on:
      gtnh:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      BACKUP_NAME: ${BACKUP_NAME:-gtnh}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-12h}
      INITIAL_DELAY: ${BACKUP_INITIAL_DELAY:-0}
      BACKUP_ON_STARTUP: "true"
      BACKUP_METHOD: tar
      TAR_COMPRESS_METHOD: gzip
      TAR_COMPRESS_PARAMETERS: "-1"
      PRUNE_BACKUPS_DAYS: ${PRUNE_BACKUPS_DAYS:-7}
      PRUNE_BACKUPS_COUNT: ${PRUNE_BACKUPS_COUNT:-14}
      EXCLUDES: ${BACKUP_EXCLUDES:-*.jar,cache,logs,*.tmp,backups,.gtnh-recovery,gtnh-upgrade-*,World-*.zip,packs}
      RCON_RETRIES: "30"
      RCON_RETRY_INTERVAL: 10s
      RCON_HOST: gtnh
      RCON_PORT: ${RCON_PORT:-25575}
      POST_BACKUP_SCRIPT: |
        [ "$$1" -eq 0 ] || exit "$$1"
        latest="$$(find /backups -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.tgz' \) -print | sort | tail -n 1)"
        test -n "$$latest"
        test -s "$$latest"
        gzip -t "$$latest"
        date -u +%s > /backups/.last-verified
    volumes:
      - gtnh-data:/data:ro
      - gtnh-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "test -s /backups/.last-verified && test \"$$(( $$(date +%s) - $$(cat /backups/.last-verified) ))\" -lt 46800"]
      interval: 30m
      timeout: 30s
      retries: 2
      start_period: 45m

volumes:
  gtnh-data:
  gtnh-backups:
