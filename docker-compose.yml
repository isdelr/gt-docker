services:
  gtnh:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MC_IMAGE_TAG: ${MC_IMAGE_TAG:-java25}
    image: ${GTNH_IMAGE_NAME:-gtnh-minecraft-server}:${MC_IMAGE_TAG:-java25}
    container_name: ${CONTAINER_NAME:-gtnh}
    restart: unless-stopped
    stop_grace_period: ${STOP_GRACE_PERIOD:-6m}
    stdin_open: true
    tty: true
    environment:
      EULA: "TRUE"
      TYPE: GTNH
      TZ: ${TZ:-America/Santo_Domingo}
      UID: ${UID:-1000}
      GID: ${GID:-1000}
      MEMORY: ${MEMORY:-16G}
      STOP_DURATION: ${STOP_DURATION:-300}
      STOP_SERVER_ANNOUNCE_DELAY: ${STOP_SERVER_ANNOUNCE_DELAY:-0}
      JVM_OPTS: "${JVM_OPTS:-} -Dfml.queryResult=cancel"
      JVM_DD_OPTS: ${JVM_DD_OPTS:-fml.queryResult:cancel}
      AUTO_RESTORE_ON_CORRUPT_LEVELDAT: ${AUTO_RESTORE_ON_CORRUPT_LEVELDAT:-true}
      AUTO_RESTORE_ON_FML_LEVELDAT_WARNING: ${AUTO_RESTORE_ON_FML_LEVELDAT_WARNING:-true}
      AUTO_RESTORE_BACKUP_DIRS: ${AUTO_RESTORE_BACKUP_DIRS:-/backups /data/backups}
      AUTO_RESTORE_BACKUP_MAX_DEPTH: ${AUTO_RESTORE_BACKUP_MAX_DEPTH:-4}
      GTNH_PACK_VERSION: ${GTNH_PACK_VERSION:-latest}
      GTNH_PACK_URL: ${GTNH_PACK_URL:-}
      SKIP_GTNH_UPDATE_CHECK: ${SKIP_GTNH_UPDATE_CHECK:-false}
      GTNH_DELETE_BACKUPS: ${GTNH_DELETE_BACKUPS:-false}
      SERVER_PORT: ${SERVER_PORT:-25565}
      MAX_PLAYERS: ${MAX_PLAYERS:-10}
      MOTD: ${MOTD:-GregTech New Horizons}
      VIEW_DISTANCE: ${VIEW_DISTANCE:-32}
      SIMULATION_DISTANCE: ${SIMULATION_DISTANCE:-32}
      ONLINE_MODE: ${ONLINE_MODE:-true}
      PVP: ${PVP:-true}
      SPAWN_PROTECTION: ${SPAWN_PROTECTION:-0}
      DIFFICULTY: ${DIFFICULTY:-hard}
      ALLOW_FLIGHT: ${ALLOW_FLIGHT:-true}
      ENABLE_COMMAND_BLOCK: ${ENABLE_COMMAND_BLOCK:-true}
      ENABLE_QUERY: ${ENABLE_QUERY:-false}
      QUERY_PORT: ${QUERY_PORT:-25565}
      ENABLE_RCON: "true"
      RCON_PORT: ${RCON_PORT:-25575}
      RCON_PASSWORD: ${RCON_PASSWORD:?Set a secure RCON_PASSWORD in Coolify or your env file}
      ENABLE_WHITELIST: ${ENABLE_WHITELIST:-true}
      ENFORCE_WHITELIST: ${ENFORCE_WHITELIST:-true}
      LEVEL_TYPE: ${LEVEL_TYPE:-rwg}
    ports:
      - "${MC_PORT:-25565}:${SERVER_PORT:-25565}/tcp"
      - "${QUERY_PORT:-25565}:${QUERY_PORT:-25565}/udp"
    volumes:
      - gtnh-data:/data
      - gtnh-backups:/backups:ro
    healthcheck:
      test: ["CMD-SHELL", "${GTNH_HEALTHCHECK_CMD:-kill -0 1}"]
      interval: ${GTNH_HEALTHCHECK_INTERVAL:-1m}
      timeout: ${GTNH_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${GTNH_HEALTHCHECK_RETRIES:-120}
      start_period: ${GTNH_HEALTHCHECK_START_PERIOD:-2h}

  gtnh-backups:
    image: itzg/mc-backup:${MC_BACKUP_IMAGE_TAG:-latest}
    container_name: ${BACKUP_CONTAINER_NAME:-gtnh-backups}
    restart: unless-stopped
    depends_on:
      gtnh:
        condition: service_started
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      BACKUP_NAME: ${BACKUP_NAME:-gtnh}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-2h}
      INITIAL_DELAY: ${BACKUP_INITIAL_DELAY:-30m}
      PRUNE_BACKUPS_DAYS: ${PRUNE_BACKUPS_DAYS:-14}
      RCON_HOST: gtnh
      RCON_PORT: ${RCON_PORT:-25575}
      RCON_PASSWORD: ${RCON_PASSWORD:?Set a secure RCON_PASSWORD in Coolify or your env file}
    volumes:
      - gtnh-data:/data:ro
      - gtnh-backups:/backups

volumes:
  gtnh-data:
  gtnh-backups:
